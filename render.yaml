services:
  - type: web
    name: jethin10-abes-hackathon-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_ENGINE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: jethin10-abes-hackathon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://jethin10-abes-hackathon-web.onrender.com
      - key: INDIA_FIAT_PROVIDER
        value: Razorpay
      - key: ESCROW_MODE
        value: MOCK
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: APPLE_TEAM_ID
        sync: false
      - key: APPLE_KEY_ID
        sync: false
      - key: APPLE_PRIVATE_KEY
        sync: false

  - type: web
    name: jethin10-abes-hackathon-web
    runtime: static
    rootDir: Frontend/original from gemini
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://jethin10-abes-hackathon-api.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_FACEBOOK_APP_ID
        sync: false

databases:
  - name: jethin10-abes-hackathon-db
    plan: free
    region: singapore
    databaseName: abes_hackathon
    user: stellaris
